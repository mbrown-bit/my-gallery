<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Gallery</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: #f4f4f4;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}

.gallery img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* Lightbox */
.lightbox {
    display: none;
    position: fixed;
    z-index: 999;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    text-align: center;
}

.lightbox img {
    margin-top: 5%;
    max-width: 80%;
    max-height: 80%;
}

/* Controls */
.controls {
    position: absolute;
    top: 50%;
    width: 100%;
    display: flex;
    justify-content: space-between;
    color: white;
    font-size: 40px;
}

.controls span {
    cursor: pointer;
    padding: 20px;
}

/* Close button */
.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 40px;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>TUGGLE DESTINATION AG</h2>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <img id="lightbox-img">
    
    <div class="controls">
        <span onclick="prevImage()">&#10094;</span>
        <span onclick="nextImage()">&#10095;</span>
    </div>
</div>

<script>
const totalImages = 25;
const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

let currentIndex = 0;

// 🔁 Auto-load images
for (let i = 1; i <= totalImages; i++) {
    let img = document.createElement("img");
    img.src = `images/image${i}.jpg`; // <-- your folder
    img.onclick = () => openLightbox(i);
    gallery.appendChild(img);
}

// Open lightbox
function openLightbox(index) {
    currentIndex = index;
    lightbox.style.display = "block";
    updateImage();
}

// Close
function closeLightbox() {
    lightbox.style.display = "none";
}

// Update image
function updateImage() {
    lightboxImg.src = `images/image${currentIndex}.jpg`;
}

// Next
function nextImage() {
    currentIndex = currentIndex < totalImages ? currentIndex + 1 : 1;
    updateImage();
}

// Previous
function prevImage() {
    currentIndex = currentIndex > 1 ? currentIndex - 1 : totalImages;
    updateImage();
}
</script>

</body>
</html>
